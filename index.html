                                        if (Math.abs(e.x - (target.x + offsetX)) < 20) {
                                            let d = finalDmg / 4; if(e.defDebuff > 0) d *= 2; e.hp -= d;
                                        }
                                    });
                                }
                                hitAny = true;
                            }
                        } else {
                            enemies.forEach(e => { 
                                if (Math.hypot((e.x) - t.x, (e.y) - t.y) < actualRange) { 
                                    let d = finalDmg; if(e.defDebuff > 0) d *= 2; e.hp -= d; hitAny = true; 
                                } 
                            });
                            if (hitAny) { 
                                specialEffects.push({ type: 'circle', x: t.x, y: t.y, radius: 5, maxRadius: actualRange, alpha: 0.5, color: "142, 68, 173" });
                            }
                        }

                        if (hitAny) t.cd = stat.cd;
                    } return;
                }

                if (stat.type === "attack" || stat.type === "pierce" || stat.type === "chain" || stat.type === "triangle_bomb" || stat.type === "tech_missile") {
                    if (t.type === 8 && t.superBuff > 0) { 
                        if (t.cd > 0) t.cd -= (5 * spdBuffMultiplier);
                        else {
                            let targets = enemies.filter(e => Math.hypot((e.x) - t.x, (e.y) - t.y) < actualRange).slice(0, 3);
                            if(targets.length > 0) {
                                targets.forEach(target => {
                                    let dx = target.x - t.x, dy = target.y - t.y;
                                    let dist = Math.hypot(dx, dy);
                                    let nx = dx / dist, ny = dy / dist;
                                    let tx = t.x + nx * actualRange;
                                    let ty = t.y + ny * actualRange;
                                    
                                    specialEffects.push({ type: 'dual_laser', x: t.x + 12, y: t.y - 2, tx: tx, ty: ty, alpha: 1.0, width: 12 });
                                    specialEffects.push({ type: 'dual_laser', x: t.x - 12, y: t.y - 2, tx: tx, ty: ty, alpha: 1.0, width: 12 });
                                    
                                    let finalDmg = stat.dmg * atkBuffMultiplier * globalDmgMulti * t.rMult * 5;
                                    enemies.forEach(e => {
                                        let crossDist = (e.x - t.x) * nx + (e.y - t.y) * ny; 
                                        if (crossDist > 0 && crossDist < actualRange) {
                                            let px = t.x + nx * crossDist, py = t.y + ny * crossDist;
                                            if (Math.hypot(e.x - px, e.y - py) < 20) {
                                                let d = finalDmg; if(e.defDebuff > 0) d *= 2; e.hp -= d;
                                                e.speed = e.baseSpeed * 0.1; e.slowTimer = 180;
                                            }
                                        }
                                    });
                                });
                                t.cd = stat.cd;
                                triggerShake(3, 2);
                            }
                        }
                    } else if (stat.type === "tech_missile") { 
                        if (t.cd > 0) t.cd -= (1 * spdBuffMultiplier);
                        else {
                            let target = enemies.find(e => Math.hypot((e.x) - t.x, (e.y) - t.y) < actualRange);
                            if (target) {
                                for(let m=0; m<5; m++) {
                                    let offsetA = (m-2)*0.4;
                                    let dx = (target.x) - t.x; let dy = (target.y) - t.y; let dist = Math.hypot(dx, dy);
                                    let bAngle = Math.atan2(dy, dx) + offsetA;
                                    bullets.push({
                                        type: 89, grade: t.grade, x: t.x, y: t.y-10,
                                        vx: Math.cos(bAngle)*12, vy: Math.sin(bAngle)*12,
                                        targetId: target.id,
                                        dmg: stat.dmg * atkBuffMultiplier * globalDmgMulti * t.rMult,
                                        slow: 0, isPierce: false, isChain: false, hitIds: []
                                    });
                                }
                                t.cd = stat.cd;
                            }
                        }
                    } else if (stat.type === "triangle_bomb") { 
                        if (t.cd > 0) t.cd -= (1 * spdBuffMultiplier);
                        else {
                            let target = enemies.find(e => Math.hypot((e.x) - t.x, (e.y) - t.y) < actualRange);
                            if (target) {
                                let dx = target.x - t.x; let dy = target.y - t.y; let dist = Math.hypot(dx, dy);
                                bullets.push({
                                    type: 'triangle', grade: t.grade, x: t.x, y: t.y-10,
                                    vx: (dx/dist)*13, vy: (dy/dist)*13, targetId: target.id,
                                    dmg: stat.dmg * atkBuffMultiplier * globalDmgMulti * t.rMult,
                                    slow: 0, isPierce: false, isChain: false, hitIds: []
                                });
                                t.cd = stat.cd;
                            }
                        }
                    } else {
                        if (t.cd > 0) t.cd -= (1 * spdBuffMultiplier);
                        else {
                            let target = enemies.find(e => Math.hypot((e.x) - t.x, (e.y) - t.y) < actualRange);
                            if (target) {
                                let dx = (target.x) - t.x; let dy = (target.y) - t.y; let dist = Math.hypot(dx, dy);
                                bullets.push({ 
                                    type: t.type, grade: t.grade, x: t.x, y: t.y-10, vx: (dx / dist) * (t.type === 4 ? 20 : 12), vy: (dy / dist) * (t.type === 4 ? 20 : 12),
                                    dmg: stat.dmg * atkBuffMultiplier * globalDmgMulti * t.rMult, slow: stat.slow || 0, isPierce: stat.type === "pierce", isChain: stat.type === "chain", hitIds: [] 
                                }); t.cd = stat.cd;
                            }
                        }
                    }
                }
            });

            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];

                // 화염 미사일 투하 (충돌검사 스킵)
                if (b.type === 'fire_missile') {
                    b.y += b.vy; 
                    
                    ctx.save();
                    ctx.translate(b.x, b.y);
                    ctx.fillStyle = '#ff7675';
                    ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(-5, -10); ctx.lineTo(5, -10); ctx.fill(); 
                    ctx.fillStyle = 'yellow';
                    ctx.beginPath(); ctx.moveTo(0, 5); ctx.lineTo(-2, -5); ctx.lineTo(2, -5); ctx.fill();
                    ctx.restore();
                    
                    if (b.y >= b.targetY) {
                        specialEffects.push({ type: 'circle', x: b.x, y: b.targetY, radius: 10, maxRadius: 30, alpha: 1.0, color: "235, 77, 75" });
                        let e = enemies.find(en => en.id === b.targetId);
                        if (e) {
                            let dmg = e.hp * 0.1; // 현재 체력의 10%
                            e.hp -= dmg;
                            floatingTexts.push({x: e.x, y: e.y - 10, text: `-${Math.floor(dmg)}`, alpha: 1, color: "#e74c3c", vy: -1.5});
                        }
                        bullets.splice(i, 1);
                    }
                    continue;
                }

                if (b.type === 89 || b.type === 'triangle' || b.type === 'triangle_frag' || b.type === 'square') { 
                    let tgt = enemies.find(e => e.id === b.targetId);
                    if (tgt && tgt.hp > 0) {
                        let dx = tgt.x - b.x; let dy = tgt.y - b.y;
                        let dist = Math.hypot(dx, dy);
                        if (dist > 0) {
                            let speed = Math.hypot(b.vx, b.vy);
                            b.vx = b.vx * 0.85 + (dx/dist) * speed * 0.15;
                            b.vy = b.vy * 0.85 + (dy/dist) * speed * 0.15;
                            let newDist = Math.hypot(b.vx, b.vy);
                            b.vx = (b.vx / newDist) * speed;
                            b.vy = (b.vy / newDist) * speed;
                        }
                    }
                    b.x += b.vx; b.y += b.vy;

                    let angle = Math.atan2(b.vy, b.vx);
                    ctx.save();
                    ctx.translate(b.x, b.y);
                    ctx.rotate(angle);
                    
                    if (b.type === 'triangle' || b.type === 'triangle_frag') {
                        ctx.fillStyle = '#e84393'; 
                        if(b.type === 'triangle') {
                            ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(-6, 6); ctx.lineTo(-6, -6); ctx.fill();
                        } else {
                            ctx.beginPath(); ctx.moveTo(4, 0); ctx.lineTo(-3, 3); ctx.lineTo(-3, -3); ctx.fill();
                        }
                    } else if (b.type === 'square') {
                        ctx.fillStyle = '#27ae60'; ctx.fillRect(-5, -5, 10, 10);
                        ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 2; ctx.strokeRect(-5, -5, 10, 10);
                    } else { 
                        let grad = ctx.createLinearGradient(-6, 0, 10, 0);
                        grad.addColorStop(0, '#f39c12'); grad.addColorStop(1, '#f1c40f');
                        ctx.fillStyle = grad; ctx.fillRect(-6, -3, 14, 6);
                        ctx.fillStyle = 'white'; ctx.beginPath(); ctx.moveTo(8, -3); ctx.lineTo(13, 0); ctx.lineTo(8, 3); ctx.fill();
                        ctx.fillStyle = '#e67e22'; ctx.beginPath(); ctx.moveTo(-6, -3); ctx.lineTo(-11, 0); ctx.lineTo(-6, 3); ctx.fill();
                    }
                    ctx.restore();

                    if(frame % 3 === 0) {
                        let effColor = (b.type === 'triangle') ? "232, 67, 147" : ((b.type === 'square') ? "46, 204, 113" : "241, 196, 15");
                        specialEffects.push({ type: 'circle', x: b.x - b.vx*0.5, y: b.y - b.vy*0.5, radius: 1, maxRadius: 2, alpha: 0.5, color: effColor });
                    }
                } else {
                    b.x += b.vx; b.y += b.vy;
                    ctx.beginPath();
                    if (b.type === 8) { 
                        ctx.strokeStyle = '#fbc531'; ctx.lineWidth = 2; ctx.moveTo(b.x, b.y); 
                        ctx.lineTo(b.x - b.vx*1.5 + (Math.random()*10-5), b.y - b.vy*1.5 + (Math.random()*10-5)); ctx.lineTo(b.x - b.vx*3, b.y - b.vy*3); ctx.stroke(); 
                    } 
                    else if (b.type === 0) { ctx.strokeStyle = '#fbc531'; ctx.lineWidth = 2; ctx.moveTo(b.x - b.vx*2, b.y - b.vy*2); ctx.lineTo(b.x, b.y); ctx.stroke(); } 
                    else if (b.type === 1) { ctx.fillStyle = '#e17055'; ctx.arc(b.x, b.y, 5, 0, Math.PI * 2); ctx.fill(); } 
                    else if (b.type === 3) { ctx.fillStyle = '#00cec9'; ctx.fillRect(b.x - 4, b.y - 4, 8, 8); } 
                    else { ctx.fillStyle = '#fdcb6e'; ctx.arc(b.x, b.y, 4, 0, Math.PI * 2); ctx.fill(); }
                }

                if (b.x < 0 || b.x > 1000 || b.y < 0 || b.y > 500) { bullets.splice(i, 1); continue; }

                let bulletRemoved = false;
                for(let j = 0; j < enemies.length; j++) {
                    let e = enemies[j];
                    if (Math.hypot((e.x) - b.x, (e.y) - b.y) < (e.isBoss ? 35 : 15)) {
                        if (b.isPierce && b.hitIds.includes(e.id)) continue;
                        let applyDmg = b.dmg; if (e.defDebuff > 0) applyDmg *= 2; 
                        
                        let isSpecial = (e.rType === 1 || e.rType === 2);
                        
                        // 데미지 적용
                        e.hp -= applyDmg; 

                        // 30라운드 이상 & 반전/황금 몬스터 피격 시 이속 부스터 확률 발동 (최적화 추가)
                        if (currentWaveIdx >= 29 && isSpecial && e.hp > 0 && e.baseSpeed < 5) {
                            let boostChance = (e.rType === 2) ? 0.10 : 0.03; // 황금 10%, 반전 3%
                            if (Math.random() < boostChance) {
                                e.baseSpeed *= 1.3; // 기본 이속 영구 30% 증가
                                e.speed = e.baseSpeed;
                                floatingTexts.push({x: e.x, y: e.y - 30, text: "💨부스터!", alpha: 1, color: "#fff", vy: -2});
                            }
                        }
                        
                        if (b.type === 'triangle') {
                            let count = 0;
                            enemies.forEach(ce => {
                                if (ce.id !== e.id && Math.hypot(ce.x - b.x, ce.y - b.y) < 200 && count < 3) {
                                    let fdx = ce.x - b.x, fdy = ce.y - b.y, fdist = Math.hypot(fdx, fdy);
                                    bullets.push({
                                        type: 'triangle_frag', x: b.x, y: b.y, vx: (fdx/fdist)*15, vy: (fdy/fdist)*15,
                                        targetId: ce.id, dmg: b.dmg * 0.4, isPierce: false, isChain: false, hitIds: []
                                    });
                                    count++;
                                }
                            });
                            specialEffects.push({ type: 'circle', x: b.x, y: b.y, radius: 5, maxRadius: 15, alpha: 0.8, color: "232, 67, 147" }); 
                        } else if (b.type === 'square') {
                            enemies.forEach(ce => {
                                if (ce.id !== e.id && Math.hypot(ce.x - b.x, ce.y - b.y) < 100) {
                                    let d = b.dmg * 0.5; if(ce.defDebuff > 0) d *= 2; ce.hp -= d;
                                }
                            });
                            specialEffects.push({ type: 'square_shatter', x: b.x, y: b.y, timer: 15 });
                        } else if (b.type === 89) {
                            specialEffects.push({ type: 'circle', x: b.x, y: b.y, radius: 5, maxRadius: 15, alpha: 0.8, color: "241, 196, 15" });
                        }

                        if (b.slow > 0) { e.speed = e.baseSpeed * b.slow; e.slowTimer = (b.type===88)?180:50; } 
                        if (b.type === 3) { e.speed = e.baseSpeed * 0.2; e.slowTimer = 60; }
                        if (b.isChain) {
                            let hits = 1; 
                            for (let k = 0; k < enemies.length; k++) {
                                if (hits >= 3) break; let ce = enemies[k];
                                if (ce.id !== e.id && Math.hypot(ce.x - e.x, ce.y - e.y) < 150) {
                                    let cdmg = b.dmg * 0.8; if(ce.defDebuff > 0) cdmg *= 2; ce.hp -= cdmg; 
                                    ctx.beginPath(); ctx.moveTo(e.x, e.y); ctx.lineTo(ce.x, ce.y); ctx.strokeStyle = '#fbc531'; ctx.lineWidth = 3; ctx.stroke(); hits++;
                                }
                            }
                            bulletRemoved = true; break;
                        }
                        if (b.isPierce) b.hitIds.push(e.id); else { bulletRemoved = true; break; } 
                    }
                }
                if(bulletRemoved) bullets.splice(i, 1);
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                if (enemies[i].hp <= 0) {
                    money += enemies[i].reward;
                    floatingTexts.push({x: enemies[i].x, y: enemies[i].y, text: `+${enemies[i].reward}만`, alpha: 1, color: "#f1c40f"});
                    document.getElementById('money').innerText = money; enemies.splice(i, 1);
                }
            }

            for (let i = specialEffects.length - 1; i >= 0; i--) {
                let eff = specialEffects[i]; 
                
                // === 십자가 레이저 장판 그리기 ===
                if (eff.type === 'cross_laser_field') {
                    eff.timer--;
                    let cx = eff.x, cy = eff.y, r = eff.radius;
                    let alpha = Math.min(0.9, eff.timer / 15); 
                    
                    let gradX = ctx.createLinearGradient(cx - r, cy, cx + r, cy);
                    gradX.addColorStop(0, `rgba(139, 0, 0, 0)`);
                    gradX.addColorStop(0.5, `rgba(231, 76, 60, ${alpha})`); // 검붉은색 중심부
                    gradX.addColorStop(1, `rgba(139, 0, 0, 0)`);

                    let gradY = ctx.createLinearGradient(cx, cy - r, cx, cy + r);
                    gradY.addColorStop(0, `rgba(139, 0, 0, 0)`);
                    gradY.addColorStop(0.5, `rgba(231, 76, 60, ${alpha})`);
                    gradY.addColorStop(1, `rgba(139, 0, 0, 0)`);

                    let laserWidth = 14 + Math.sin(frame * 0.5) * 4;

                    ctx.fillStyle = gradX; ctx.fillRect(cx - r, cy - laserWidth/2, r*2, laserWidth);
                    ctx.fillStyle = gradY; ctx.fillRect(cx - laserWidth/2, cy - r, laserWidth, r*2);

                    ctx.fillStyle = `rgba(255, 150, 150, ${alpha})`;
                    ctx.fillRect(cx - laserWidth/4, cy - laserWidth/4, laserWidth/2, laserWidth/2);

                    // 10프레임마다 데미지 판정
                    if (eff.timer % 10 === 0) {
                        enemies.forEach(e => {
                            let touchX = Math.abs(e.x - cx) < r && Math.abs(e.y - cy) < laserWidth;
                            let touchY = Math.abs(e.x - cx) < laserWidth && Math.abs(e.y - cy) < r;
                            if (touchX || touchY) {
                                let d = eff.dmg;
                                if (e.defDebuff > 0) d *= 2;
                                e.hp -= d;
                                floatingTexts.push({x: e.x + (Math.random()*20-10), y: e.y - 10, text: `-${Math.floor(d)}`, alpha: 1, color: "#e74c3c", vy: -1.5});
                            }
                        });
                    }

                    if (eff.timer <= 0) specialEffects.splice(i, 1);
                }
                else if (eff.type === 'square_shatter') {
                    ctx.fillStyle = "#2ecc71";
                    for(let k=0; k<8; k++) {
                        let angle = (Math.PI / 4) * k;
                        let dist = (15 - eff.timer) * 4;
                        ctx.fillRect(eff.x + Math.cos(angle)*dist, eff.y + Math.sin(angle)*dist, 4, 4);
                    }
                    eff.timer--;
                    if (eff.timer <= 0) specialEffects.splice(i, 1);
                } else if (eff.type === 'laser') {
                    ctx.beginPath(); ctx.moveTo(eff.x, eff.y); ctx.lineTo(eff.tx, eff.ty);
                    ctx.strokeStyle = `rgba(${eff.color}, ${eff.alpha})`; ctx.lineWidth = eff.width; ctx.stroke();
                    
                    ctx.beginPath(); ctx.moveTo(eff.x, eff.y); ctx.lineTo(eff.tx, eff.ty);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${eff.alpha})`; ctx.lineWidth = eff.width / 2; ctx.stroke();
                    
                    eff.alpha -= 0.05;
                    if (eff.width > 0) eff.width -= 1;
                    if (eff.alpha <= 0) specialEffects.splice(i, 1);
                } else if (eff.type === 'vertical_laser') {
                    ctx.beginPath(); ctx.moveTo(eff.x, eff.y); ctx.lineTo(eff.x, eff.ty);
                    ctx.strokeStyle = `rgba(0, 0, 0, ${eff.alpha})`; ctx.lineWidth = eff.width; ctx.stroke();
                    
                    ctx.beginPath(); ctx.moveTo(eff.x, eff.y); ctx.lineTo(eff.x, eff.ty);
                    ctx.strokeStyle = `rgba(46, 204, 113, ${eff.alpha})`; ctx.lineWidth = eff.width / 1.5; ctx.stroke();
                    
                    ctx.beginPath(); ctx.moveTo(eff.x, eff.y); ctx.lineTo(eff.x, eff.ty);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${eff.alpha})`; ctx.lineWidth = eff.width / 3; ctx.stroke();
                    
                    eff.alpha -= 0.05;
                    if (eff.width > 0) eff.width -= 1;
                    if (eff.alpha <= 0) specialEffects.splice(i, 1);
                } else if (eff.type === 'dual_laser') {
                    ctx.beginPath(); ctx.moveTo(eff.x, eff.y); ctx.lineTo(eff.tx, eff.ty);
                    ctx.strokeStyle = `rgba(0, 0, 0, ${eff.alpha})`; ctx.lineWidth = eff.width; ctx.stroke();
                    
                    ctx.beginPath(); ctx.moveTo(eff.x, eff.y); ctx.lineTo(eff.tx, eff.ty);
                    ctx.strokeStyle = `rgba(241, 196, 15, ${eff.alpha})`; ctx.lineWidth = eff.width / 1.5; ctx.stroke();
                    
                    ctx.beginPath(); ctx.moveTo(eff.x, eff.y); ctx.lineTo(eff.tx, eff.ty);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${eff.alpha})`; ctx.lineWidth = eff.width / 3; ctx.stroke();
                    
                    eff.alpha -= 0.05;
                    if (eff.width > 0) eff.width -= 1;
                    if (eff.alpha <= 0) specialEffects.splice(i, 1);
                } else if (eff.type === 'circle') {
                    eff.radius += 12; eff.alpha -= 0.04;
                    ctx.beginPath(); ctx.arc(eff.x, eff.y, eff.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${eff.color}, ${eff.alpha})`; ctx.fill();
                    if (eff.alpha <= 0) specialEffects.splice(i, 1);
                }
            }
            
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i]; 
                ft.y += (ft.vy || -1); 
                ft.alpha -= 0.02;
                ctx.fillStyle = ft.color || `rgba(255, 255, 255, ${ft.alpha})`;
                ctx.font = 'bold 16px Arial'; ctx.fillText(ft.text, ft.x - 10, ft.y);
                if (ft.alpha <= 0) floatingTexts.splice(i, 1);
            }

            for (let i = giantTexts.length - 1; i >= 0; i--) {
                let gt = giantTexts[i]; gt.timer--; gt.scale += 0.01;
                ctx.fillStyle = gt.color; ctx.font = `bold ${30 + gt.scale * 5}px Arial`; ctx.textAlign = "center";
                ctx.lineWidth = 3; ctx.strokeStyle = 'black'; ctx.strokeText(gt.text, 500, 250);
                ctx.fillText(gt.text, 500, 250); ctx.textAlign = "left"; 
                if (gt.timer <= 0) giantTexts.splice(i, 1);
            }

            // === 💥 기술사/관리사/지도사/엘리트 컷신 이펙트 ===
            if (skillCutin) {
                skillCutin.timer--;
                
                let bgAlpha = Math.min(0.6, (90 - skillCutin.timer) * 0.1);
                if (skillCutin.timer < 15) bgAlpha = skillCutin.timer / 15 * 0.6;
                if (skillCutin.type === 10) {
                    bgAlpha = Math.min(0.7, (120 - skillCutin.timer) * 0.05);
                    if (skillCutin.timer < 20) bgAlpha = skillCutin.timer / 20 * 0.7;
                }

                ctx.save();
                ctx.globalAlpha = Math.max(0, bgAlpha);
                ctx.fillStyle = 'rgba(0, 0, 0, 1.0)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.restore();

                let maxTime = skillCutin.type === 10 ? 120 : 90;
                let enterTime = skillCutin.type === 10 ? 100 : 75;

                let slideX = 300;
                if (skillCutin.timer > enterTime) {
                    let t = (skillCutin.timer - enterTime) / (maxTime - enterTime); 
                    slideX = 300 - (Math.pow(t, 2) * 500); 
                } else if (skillCutin.timer < 15) {
                    let t = (15 - skillCutin.timer) / 15; 
                    slideX = 300 + (Math.pow(t, 2) * 800); 
                }

                ctx.save();
                ctx.translate(slideX, 300);
                ctx.scale(6, 6); 
                drawCuteGirl(ctx, 0, 0, skillCutin.type, frame, skillCutin.rType, 0, false, true);
                ctx.restore();

                ctx.save();
                ctx.globalAlpha = Math.max(0, bgAlpha / 0.6); 
                
                let txtColor, txt;
                if (skillCutin.type === 8) { txtColor = "#fbc531"; txt = "이 구역의 감리는 나다!!"; }
                else if (skillCutin.type === 9) { txtColor = "#eb4d4b"; txt = "내가 이구역 소방기술사 선임이다!!"; }
                else if (skillCutin.type === 6) { txtColor = "#e84393"; txt = "종합정밀점검 시작하겠습니다!"; }
                else if (skillCutin.type === 7) { txtColor = "#d63031"; txt = "위험구역 접근 금지!!"; }
                else if (skillCutin.type === 10) { txtColor = "#2ecc71"; txt = "음... 지적 사항이 많군..."; }

                ctx.fillStyle = txtColor;
                ctx.font = "italic bold 40px 'Malgun Gothic'";
                ctx.strokeStyle = "black";
                ctx.lineWidth = 5;
                ctx.strokeText(txt, slideX + 120, 250);
                ctx.fillText(txt, slideX + 120, 250);
                ctx.restore();

                if (skillCutin.timer <= 0) skillCutin = null;
            }

            // === 💀 Elite 사신 스킬 연출 ===
            if (reaperEffect) {
                reaperEffect.timer--;
                reaperEffect.alpha = Math.min(0.6, reaperEffect.alpha + 0.05);
                if (reaperEffect.timer < 30) reaperEffect.alpha -= 0.1;
                
                ctx.save();
                ctx.globalAlpha = Math.max(0, reaperEffect.alpha);
                ctx.translate(800, 250); 
                
                ctx.fillStyle = '#2d3436';
                ctx.beginPath(); ctx.arc(0, -50, 60, Math.PI, 0); ctx.lineTo(80, 100); ctx.lineTo(-80, 100); ctx.fill(); 
                
                ctx.fillStyle = 'white'; 
                ctx.beginPath(); ctx.arc(0, -60, 25, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'red'; 
                ctx.fillRect(-15, -65, 10, 5); ctx.fillRect(5, -65, 10, 5);

                ctx.fillStyle = 'yellow'; 
                ctx.beginPath(); ctx.arc(0, -75, 28, Math.PI, 0); ctx.fill();
                ctx.fillRect(-35, -75, 70, 5);

                let fingerExt = (120 - reaperEffect.timer) * 3;
                if (fingerExt > 100) fingerExt = 100;
                ctx.fillStyle = 'white';
                ctx.fillRect(-40 - fingerExt, -20, fingerExt, 15);
                ctx.beginPath(); ctx.arc(-40 - fingerExt, -12.5, 7.5, 0, Math.PI*2); ctx.fill();

                ctx.restore();

                if (reaperEffect.timer <= 0) reaperEffect = null;
            }

            if (fusionPairs.length > 0 && !isDemolishMode && !movingTower) {
                fusionPairs.forEach(p => {
                    let fY = p.my - 50; 
                    ctx.fillStyle = 'rgba(46, 204, 113, 0.9)';
                    ctx.fillRect(p.mx - 40, fY, 80, 30);
                    ctx.strokeStyle = '#27ae60'; ctx.lineWidth = 2; ctx.strokeRect(p.mx - 40, fY, 80, 30);
                    ctx.fillStyle = 'white'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
                    ctx.fillText("✨ 융합(10억)", p.mx, fY + 19);
                    ctx.textAlign = 'left';
                });
            }

            if (movingTower) {
                let hc = Math.floor(mouseX / CELL_SIZE);
                let hr = Math.floor(mouseY / CELL_SIZE);
                let drawX = hc * CELL_SIZE + CELL_SIZE/2;
                let drawY = hr * CELL_SIZE + CELL_SIZE/2;
                ctx.globalAlpha = 0.5; drawCuteGirl(ctx, drawX, drawY, movingTower.type, frame, movingTower.rType, 0, false); ctx.globalAlpha = 1.0;
            } else if (!selectedTower && mouseX > 0 && mouseX < 1000 && mouseY > 0 && mouseY < 500 && buildType !== null) {
                let hc = Math.floor(mouseX / CELL_SIZE);
                let hr = Math.floor(mouseY / CELL_SIZE);
                let drawX = hc * CELL_SIZE + CELL_SIZE/2;
                let drawY = hr * CELL_SIZE + CELL_SIZE/2;

                if (buildType === 'gacha' || buildType === 'random') {
                    ctx.fillStyle = 'white'; ctx.font = '14px Arial'; 
                    let drawText = buildType === 'random' ? "일반 채용" : "가챠";
                    ctx.fillText(`🎲 ${drawText}`, drawX - 30, drawY - 25);
                } else if (!isDemolishMode) {
                    let statIndex = Math.min(0, towerStats[buildType].length - 1);
                    let drawRange = towerStats[buildType][statIndex].range * globalRangeMulti; 
                    ctx.beginPath(); ctx.arc(drawX, drawY, drawRange, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.1)'; ctx.fill(); ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)'; ctx.stroke();
                    ctx.fillStyle = 'white'; ctx.font = '14px Arial'; ctx.fillText(`채용: ${towerStats[buildType][statIndex].cost}만`, drawX - 30, drawY - 25);
                }
            }

            if (selectedTower && !isDemolishMode && !movingTower) {
                let hx = selectedTower.x; let hy = selectedTower.y;
                let uiY = hy - 50; 
                if (uiY < 0) uiY = hy + 25; 
                
                ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = 2; ctx.strokeRect(hx - 20, hy - 20, 40, 40);
                ctx.fillStyle = 'rgba(44, 62, 80, 0.9)'; ctx.fillRect(hx - 45, uiY, 90, 25); 

                let maxGrade = (selectedTower.rType > 0) ? 3 : towerStats[selectedTower.type].length - 1;
                ctx.fillStyle = (selectedTower.grade < maxGrade) ? '#27ae60' : '#7f8c8d';
                ctx.fillRect(hx - 40, uiY + 3, 40, 19);
                ctx.fillStyle = 'white'; ctx.font = 'bold 11px Arial'; ctx.fillText("진급", hx - 32, uiY + 17);

                ctx.fillStyle = '#3498db'; ctx.fillRect(hx + 2, uiY + 3, 40, 19);
                ctx.fillStyle = 'white'; ctx.fillText("이동", hx + 10, uiY + 17);
            }
        }

        // 60FPS 프레임 고정
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
